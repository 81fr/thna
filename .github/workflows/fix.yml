name: Fix Submodules
on: push
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1
      - name: Remove submodules
        run: |
          git config user.name "FixBot"
          git config user.email "bot@example.com"
          git rm --cached -r assets/ashm-abo-nwaf || true
          git rm --cached -r assets/kafalah-platform || true
          rm -rf assets/ashm-abo-nwaf || true
          rm -rf assets/kafalah-platform || true
          git commit -m "Remove broken submodules via Action" || true
          git push origin main || true
