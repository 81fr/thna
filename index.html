<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة العيد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --secondary: #2ecc71;
            --secondary-dark: #27ae60;
            --accent: #e67e22;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #2c3e50;
            --text-secondary: #7f8c8d;
            --shadow-soft: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        @font-face {
            font-family: 'SymbioAR+LT-Black';
            src: url('assets/SymbioAR+LT-Black.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'Tajawal', 'SymbioAR+LT-Black', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Glassmorphism Container */
        .app-wrapper {
            display: flex;
            flex-direction: row; /* Standard row with RTL puts sidebar on the right */
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            margin-top: 20px;
        }

        .main-content {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
        }

        /* Header */
        .header {
            margin-bottom: 10px;
            text-align: center;
        }

        .header h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to left, #2c3e50, #3498db);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Input Styles */
        .input-group {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            text-align: center;
            background: rgba(255,255,255,0.8);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
            background: white;
            transform: translateY(-1px);
        }

        /* Buttons Style */
        .btn {
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4);
        }

        .btn:disabled {
            background: #cbd5e0;
            color: #718096;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Preview Area */
        .preview-area {
            position: relative;
            width: 100%;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.3s ease;
        }

        /* Template Grid */
        .template-selector {
            margin-bottom: 5px;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 12px;
            max-height: 220px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.03);
            border-radius: 12px;
            margin-top: 10px;
        }

        .templates-grid::-webkit-scrollbar {
            width: 6px;
        }
        .templates-grid::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 10px;
        }

        .template-thumb {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .template-thumb:hover {
            transform: scale(1.08) rotate(1deg);
            z-index: 10;
        }

        .template-thumb.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(52,152,219,0.4);
            transform: scale(1.05);
        }

        /* Controls Panel */
        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 5px;
            outline: none;
            margin: 10px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(52,152,219,0.3);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--primary-dark);
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        input[type="color"] {
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        /* Uploaders */
        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .custom-upload {
            position: relative;
            background: #f8fafc;
            border: 2px dashed #cbd5e2;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .custom-upload:hover {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .custom-upload label {
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #475569;
        }

        #loadingMsg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-weight: 700;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .divider {
            margin: 20px 0;
            border-top: 1px solid #e2e8f0;
            position: relative;
            text-align: center;
        }

        .divider span {
            position: relative;
            top: -12px;
            background: #fdfdfd;
            padding: 0 15px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
        }

        /* Responsive Layout */
        @media (max-width: 850px) {
            .app-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .sidebar {
                width: 100%;
                max-width: 500px;
                order: 2;
            }
            .main-content {
                max-width: 500px;
                width: 100%;
                order: 1;
            }
        }

        @media (max-width: 500px) {
            body { padding: 10px; }
            .header h1 { font-size: 22px; }
            .main-content { padding: 20px; }
        }

        /* Fix compatibility */
        .header h1 {
            -webkit-background-clip: text;
            background-clip: text;
        }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
        }
    </style>
</head>

        const userPhotoInput = document.getElementById('userPhotoInput');
        const photoSettingsPanel = document.getElementById('photoSettingsPanel');
        const photoSizeSlider = document.getElementById('photoSize');
        const photoXSlider = document.getElementById('photoX');
        const photoYSlider = document.getElementById('photoY');
        const photoSizeVal = document.getElementById('photoSizeVal');
        const photoXVal = document.getElementById('photoXVal');
        const photoYVal = document.getElementById('photoYVal');
        const templateThumbs = document.querySelectorAll('.template-thumb');
        const customTemplateInput = document.getElementById('customTemplateInput');
        const autoLayoutBtn = document.getElementById('autoLayoutBtn');
        const saveLayoutBtn = document.getElementById('saveLayoutBtn');
        const fontSizeVal = document.getElementById('fontSizeVal');
        const posYVal = document.getElementById('posYVal');
        const posXVal = document.getElementById('posXVal');

        // --- State ---
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scaleMultiplier = 1;
        let bgImage = new Image();
        let imageLoaded = false;
        let fontLoaded = false;
        let employeeNamesList = [];
        let userPhotoImg = new Image();
        let isUserPhotoLoaded = false;
        let activeFontFamily = 'SymbioAR+LT-Black';
        let lastSavedName = '';

        // --- Drag & Resize State ---
        let dragState = {
            active: false,
            target: null, // 'text', 'photo'
            mode: 'drag',  // 'drag', 'resize'
            startX: 0,
            startY: 0,
            startPhotoX: 0,
            startPhotoY: 0,
            startTextX: 0,
            startTextY: 0,
            startSize: 0
        };

        // --- Auto Layout Configs (calibrated from reference images) ---
        const autoLayouts = {
            'assets/greeting.png':  { fontSize: 58, posY: 58, posX: 50, photoSize: 100, photoX: 50, photoY: 30, color: '#ffffff' },
            'assets/greeting2.png': { fontSize: 51, posY: 45, posX: 50, photoSize: 95,  photoX: 50, photoY: 34, color: '#ffffff' },
            'assets/greeting3.png': { fontSize: 55, posY: 83, posX: 50, photoSize: 110, photoX: 50, photoY: 40, color: '#ffffff' },
            'assets/greeting4.png': { fontSize: 44, posY: 88, posX: 50, photoSize: 100, photoX: 50, photoY: 35, color: '#4a5a4a' },
            'assets/greeting5.png': { fontSize: 46, posY: 90, posX: 50, photoSize: 100, photoX: 50, photoY: 38, color: '#444444' },
            'assets/greeting6.png': { fontSize: 46, posY: 72, posX: 50, photoSize: 105, photoX: 50, photoY: 35, color: '#333333' },
            'assets/greeting7.png': { fontSize: 46, posY: 88, posX: 50, photoSize: 100, photoX: 50, photoY: 32, color: '#ffffff' },
            'assets/greeting8.png': { fontSize: 46, posY: 78, posX: 50, photoSize: 90,  photoX: 50, photoY: 44, color: '#ffffff' },
            'assets/greeting9.png': { fontSize: 46, posY: 80, posX: 50, photoSize: 105, photoX: 50, photoY: 37, color: '#2c5f6a' },
            'default': { fontSize: 58, posY: 58, posX: 50, photoSize: 100, photoX: 50, photoY: 35, color: '#ffffff' }
        };

        // --- Core Functions ---
        function updateSliderLabels() {
            if (fontSizeVal) fontSizeVal.textContent = fontSizeSlider.value;
            if (posYVal) posYVal.textContent = posYSlider.value;
            if (posXVal) posXVal.textContent = posXSlider.value;
            if (photoSizeVal) photoSizeVal.textContent = photoSizeSlider.value;
            if (photoXVal) photoXVal.textContent = photoXSlider.value;
            if (photoYVal) photoYVal.textContent = photoYSlider.value;
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function isPointInCircle(px, py, cx, cy, radius) {
            const dx = px - cx;
            const dy = py - cy;
            return Math.sqrt(dx * dx + dy * dy) <= radius;
        }

        function getTextMetrics() {
            const name = nameInput.value.trim() || ' ';
            const fontSize = fontSizeSlider.value * scaleMultiplier;
            ctx.font = `bold ${fontSize}px '${activeFontFamily}', 'Tajawal', Arial, sans-serif`;
            const metrics = ctx.measureText(name);
            const x = canvas.width * (posXSlider.value / 100);
            const y = canvas.height * (posYSlider.value / 100);
            const height = fontSize; // Approximate
            const width = metrics.width;
            return {
                x: x - width / 2,
                y: y - height / 2,
                w: width,
                h: height,
                centerX: x,
                centerY: y
            };
        }

        function setupCanvas() {
            canvas.width = bgImage.width * scaleMultiplier;
            canvas.height = bgImage.height * scaleMultiplier;
            canvas.style.width = bgImage.width + 'px';
            ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
        }

        function getAIContrastColor(xPercent, yPercent) {
            if (!imageLoaded) return '#ffffff';
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(bgImage, 0, 0, tempCanvas.width, tempCanvas.height);
            const x = tempCanvas.width * (xPercent / 100);
            const y = tempCanvas.height * (yPercent / 100);
            const sampleSize = 40;
            const imgData = tCtx.getImageData(
                Math.max(0, x - sampleSize/2), 
                Math.max(0, y - sampleSize/2), 
                sampleSize, sampleSize
            ).data;
            let totalLuminance = 0;
            for (let i = 0; i < imgData.length; i += 4) {
                totalLuminance += (0.299 * imgData[i] + 0.587 * imgData[i+1] + 0.114 * imgData[i+2]);
            }
            const avgLuminance = totalLuminance / (imgData.length / 4);
            if (avgLuminance > 180) return '#b8860b'; 
            if (avgLuminance > 120) return '#2c3e50'; 
            return '#ffffff';
        }

        async function applyAutoLayoutSystem() {
            const currentSrc = bgImage.getAttribute('src');
            const config = autoLayouts[currentSrc] || autoLayouts['default'];
            fontSizeSlider.value = config.fontSize;
            posYSlider.value = isUserPhotoLoaded ? Math.min(config.posY + 8, 95) : config.posY;
            posXSlider.value = config.posX;
            if (isUserPhotoLoaded) {
                photoSizeSlider.value = config.photoSize;
                photoXSlider.value = config.photoX;
                photoYSlider.value = config.photoY;
            }
            if (config.color) {
                colorInput.value = config.color;
            } else {
                const bestColor = getAIContrastColor(posXSlider.value, posYSlider.value);
                colorInput.value = bestColor;
            }
            const originalText = autoLayoutBtn.innerHTML;
            autoLayoutBtn.innerHTML = '✨ تم ضبط التنسيق واللون ذكياً!';
            autoLayoutBtn.style.backgroundColor = '#2ecc71';
            setTimeout(() => {
                autoLayoutBtn.innerHTML = originalText;
                autoLayoutBtn.style.backgroundColor = '#27ae60';
            }, 2000);
            updateSliderLabels();
            if (nameInput.value.trim()) drawCard();
        }

        // --- Firebase Functions ---
        window.saveVisitorDataToFirebase = async function(name, canvasDataUrl) {
            try {
                const tempCanvas = document.createElement('canvas');
                const img = new Image();
                await new Promise((resolve) => {
                    img.onload = resolve;
                    img.src = canvasDataUrl;
                });
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(img, 0, 0);
                const compressedBase64 = tempCanvas.toDataURL('image/jpeg', 0.4);
                await addDoc(collection(db, "visitors"), {
                    name: name,
                    imageData: compressedBase64,
                    timestamp: serverTimestamp(),
                    userAgent: navigator.userAgent
                });
                console.log("تم حفظ بيانات الزائر بنجاح!");
            } catch (e) {
                console.error("Error saving visitor data:", e);
            }
        }

        async function saveTemplateConfigToFirebase(templateId, config) {
            try {
                const docId = templateId.replace(/\//g, '_');
                await setDoc(doc(db, "template_configs", docId), {
                    ...config,
                    updatedAt: serverTimestamp()
                });
                return true;
            } catch (e) {
                console.error("Error saving template config:", e);
                return false;
            }
        }

        async function loadTemplateConfigsFromFirebase() {
            try {
                const querySnapshot = await getDocs(collection(db, "template_configs"));
                const configs = {};
                querySnapshot.forEach((doc) => {
                    const templateId = doc.id.replace(/_/g, '/');
                    configs[templateId] = doc.data();
                });
                return configs;
            } catch (e) {
                console.error("Error loading template configs:", e);
                return {};
            }
        }

        async function initTemplateConfigs() {
            const remoteConfigs = await loadTemplateConfigsFromFirebase();
            Object.keys(remoteConfigs).forEach(id => {
                // تذكير: لا تقم بتجاوز القالب الأول والثاني إذا كان مخزناً بقيم قديمة
                if (id === 'assets/greeting.png' || id === 'assets/greeting2.png') return;
                autoLayouts[id] = remoteConfigs[id];
            });
            if (imageLoaded) applyAutoLayoutSystem();
        }

        function loadTemplate(src, forceAutoLayout = false) {
            loadingMsg.style.display = 'block';
            loadingMsg.textContent = 'جاري تحميل صورة التهنئة...';
            generateBtn.disabled = true;
            batchDownloadBtn.disabled = true;
            imageLoaded = false;
            
            bgImage.src = src;
            bgImage.crossOrigin = "anonymous";
            
            // Only auto-layout if forced or if it's the first load
            if (forceAutoLayout) {
                setTimeout(() => {
                    if (imageLoaded) applyAutoLayoutSystem();
                }, 100);
            }
        }

        // --- bgImage Handlers ---
        bgImage.onload = () => {
            imageLoaded = true;
            loadingMsg.style.display = 'none';
            generateBtn.disabled = false;
            if (employeeNamesList.length > 0) batchDownloadBtn.disabled = false;
            setupCanvas();
            controlsPanel.style.display = 'block';
            // We NO LONGER call applyAutoLayoutSystem here to prevent resetting manual changes
        };

        bgImage.onerror = (err) => {
            console.error("Critical error loading template:", bgImage.src, err);
            loadingMsg.textContent = 'حدث خطأ أثناء تحميل صورة التهنئة: ' + bgImage.src;
            loadingMsg.style.color = '#e74c3c';
        };

        function drawCard(nameParam = null) {
            if (!imageLoaded) return;
            if (!fontLoaded) {
                setTimeout(() => drawCard(nameParam), 100);
                return;
            }
            const name = nameParam || nameInput.value.trim();
            if (!name && !nameParam) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

            if (isUserPhotoLoaded) {
                const pSize = photoSizeSlider.value * scaleMultiplier;
                const pX = canvas.width * (photoXSlider.value / 100);
                const pY = canvas.height * (photoYSlider.value / 100);
                ctx.save();
                ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
                ctx.shadowBlur = 15 * scaleMultiplier;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 5 * scaleMultiplier;
                ctx.beginPath();
                ctx.arc(pX, pY, pSize, 0, Math.PI * 2, true);
                ctx.closePath();
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.shadowColor = 'transparent';
                ctx.clip();
                const aspectRatio = userPhotoImg.width / userPhotoImg.height;
                let drawWidth, drawHeight;
                if (aspectRatio > 1) {
                    drawHeight = pSize * 2;
                    drawWidth = drawHeight * aspectRatio;
                } else {
                    drawWidth = pSize * 2;
                    drawHeight = drawWidth / aspectRatio;
                }
                ctx.drawImage(userPhotoImg, pX - drawWidth/2, pY - drawHeight/2, drawWidth, drawHeight);
                ctx.restore();
                ctx.save();
                ctx.beginPath();
                ctx.arc(pX, pY, pSize, 0, Math.PI * 2, true);
                ctx.lineWidth = 4 * scaleMultiplier;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();
                ctx.restore();
            }

            const fontSize = fontSizeSlider.value * scaleMultiplier;
            ctx.font = `bold ${fontSize}px '${activeFontFamily}', 'Tajawal', Arial, sans-serif`;
            ctx.fillStyle = colorInput.value;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 10 * scaleMultiplier;
            ctx.shadowOffsetX = 2 * scaleMultiplier;
            ctx.shadowOffsetY = 2 * scaleMultiplier;
            const x = canvas.width * (posXSlider.value / 100);
            const y = (canvas.height * (posYSlider.value / 100));
            ctx.fillText(name, x, y);

            // --- Visual Feedback for Interaction (Only during drag/resize) ---
            if (dragState.active) {
                // Photo Highlight
                if (isUserPhotoLoaded && dragState.target === 'photo') {
                    const pSize = photoSizeSlider.value * scaleMultiplier;
                    const pX = canvas.width * (photoXSlider.value / 100);
                    const pY = canvas.height * (photoYSlider.value / 100);
                    ctx.save();
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = 'var(--primary)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(pX, pY, pSize + 5, 0, Math.PI * 2);
                    ctx.stroke();
                    // Resize Handle for Photo
                    ctx.setLineDash([]);
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(pX + pSize, pY, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'var(--primary)';
                    ctx.beginPath();
                    ctx.arc(pX + pSize, pY, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                // Text Highlight
                if (dragState.target === 'text') {
                    const tm = getTextMetrics();
                    ctx.save();
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = 'var(--primary)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(tm.x - 10, tm.y - 10, tm.w + 20, tm.h + 20);
                    // Resize Handle for Text
                    ctx.setLineDash([]);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(tm.x + tm.w + 5, tm.y + tm.h / 2 - 8, 16, 16);
                    ctx.fillStyle = 'var(--primary)';
                    ctx.fillRect(tm.x + tm.w + 7, tm.y + tm.h / 2 - 6, 12, 12);
                    ctx.restore();
                }
            }

            if (!nameParam) {
                previewContainer.style.display = 'block';
                downloadBtn.style.display = 'block';
                const currentDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                if (name && name !== lastSavedName) {
                    window.saveVisitorDataToFirebase(name, currentDataUrl);
                    lastSavedName = name;
                }
            }
        }

        // --- Event Listeners ---
        const customFont = new FontFace('SymbioAR+LT-Black', 'url(assets/SymbioAR+LT-Black.otf)');
        customFont.load().then(function (loadedFace) {
            document.fonts.add(loadedFace);
            fontLoaded = true;
            if (imageLoaded && nameInput.value.trim()) drawCard();
        }).catch(function (error) {
            console.error('خطأ في تحميل الخط:', error);
            fontLoaded = true;
        });

        fontInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const fontData = event.target.result;
                    const newFontFamily = 'CustomFont_' + Date.now();
                    const newCustomFont = new FontFace(newFontFamily, fontData);
                    newCustomFont.load().then(function(loadedFace) {
                        document.fonts.add(loadedFace);
                        activeFontFamily = newFontFamily;
                        currentFontName.textContent = file.name;
                        currentFontName.style.color = '#e67e22';
                        if (nameInput.value.trim()) drawCard();
                    }).catch(err => {
                        alert('حدث خطأ أثناء تحميل الخط.');
                        console.error(err);
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        });

        autoLayoutBtn.addEventListener('click', applyAutoLayoutSystem);
        templateThumbs.forEach(thumb => {
            thumb.addEventListener('click', function() {
                templateThumbs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                // Don't force auto-layout when switching normally, keep current settings
                loadTemplate(this.getAttribute('data-src'), false);
            });
        });

        customTemplateInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                templateThumbs.forEach(t => t.classList.remove('active'));
                const reader = new FileReader();
                reader.onload = function(event) {
                    loadTemplate(event.target.result, true); // Force auto-layout for custom templates
                };
                reader.readAsDataURL(file);
            }
        });

        userPhotoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    userPhotoImg.src = event.target.result;
                    userPhotoImg.onload = function() {
                        isUserPhotoLoaded = true;
                        photoSettingsPanel.style.display = 'block';
                        applyAutoLayoutSystem();
                        drawCard(nameInput.value.trim() || ' ');
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        generateBtn.addEventListener('click', () => {
            if (!nameInput.value.trim()) {
                alert('الرجاء إدخال اسم لمعاينة البطاقة');
                return;
            }
            drawCard();
        });

        fontSizeSlider.addEventListener('input', () => { updateSliderLabels(); if (nameInput.value.trim()) drawCard(); });
        posYSlider.addEventListener('input', () => { updateSliderLabels(); if (nameInput.value.trim()) drawCard(); });
        posXSlider.addEventListener('input', () => { updateSliderLabels(); if (nameInput.value.trim()) drawCard(); });
        colorInput.addEventListener('input', () => { if (nameInput.value.trim() && previewContainer.style.display === 'block') drawCard(); });
        photoSizeSlider.addEventListener('input', () => { if (isUserPhotoLoaded && previewContainer.style.display === 'block') drawCard(nameInput.value.trim() || ' '); });
        photoXSlider.addEventListener('input', () => { if (isUserPhotoLoaded && previewContainer.style.display === 'block') drawCard(nameInput.value.trim() || ' '); });
        photoYSlider.addEventListener('input', () => { if (isUserPhotoLoaded && previewContainer.style.display === 'block') drawCard(nameInput.value.trim() || ' '); });
        nameInput.addEventListener('input', () => { if (previewContainer.style.display === 'block' && imageLoaded) drawCard(); });
        nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && imageLoaded && nameInput.value.trim()) drawCard(); });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            const sanitizedName = nameInput.value.trim().replace(/\s+/g, '-');
            link.download = `معايدة-${sanitizedName || 'التهنئة'}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 1.0);
            link.click();
        });

        // --- Direct Canvas Manipulation Handlers ---
        canvas.addEventListener('mousedown', handlePointerDown);
        canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('touchmove', handlePointerMove, { passive: false });
        window.addEventListener('mouseup', handlePointerUp);
        window.addEventListener('touchend', handlePointerUp);

        function handlePointerDown(e) {
            if (!imageLoaded) return;
            const coords = getCanvasCoords(e);
            const tm = getTextMetrics();
            
            // Check Text Resize Handle (Larger hit area)
            if (coords.x >= tm.x + tm.w + 0 && coords.x <= tm.x + tm.w + 30 && 
                coords.y >= tm.y + tm.h/2 - 15 && coords.y <= tm.y + tm.h/2 + 15) {
                dragState = { active: true, target: 'text', mode: 'resize', startX: coords.x, startSize: parseInt(fontSizeSlider.value) };
                e.preventDefault();
                return;
            }

            // Check Text Drag
            if (coords.x >= tm.x - 10 && coords.x <= tm.x + tm.w + 10 && 
                coords.y >= tm.y - 10 && coords.y <= tm.y + tm.h + 10) {
                dragState = { active: true, target: 'text', mode: 'drag', startX: coords.x, startY: coords.y, startTextX: parseInt(posXSlider.value), startTextY: parseInt(posYSlider.value) };
                e.preventDefault();
                return;
            }

            if (isUserPhotoLoaded) {
                const pSize = photoSizeSlider.value * scaleMultiplier;
                const pX = canvas.width * (photoXSlider.value / 100);
                const pY = canvas.height * (photoYSlider.value / 100);

                // Check Photo Resize Handle (Larger hit area)
                const distToResize = Math.sqrt(Math.pow(coords.x - (pX + pSize), 2) + Math.pow(coords.y - pY, 2));
                if (distToResize < 25) {
                    dragState = { active: true, target: 'photo', mode: 'resize', startX: coords.x, startSize: parseInt(photoSizeSlider.value) };
                    e.preventDefault();
                    return;
                }

                // Check Photo Drag
                if (isPointInCircle(coords.x, coords.y, pX, pY, pSize)) {
                    dragState = { active: true, target: 'photo', mode: 'drag', startX: coords.x, startY: coords.y, startPhotoX: parseInt(photoXSlider.value), startPhotoY: parseInt(photoYSlider.value) };
                    e.preventDefault();
                    return;
                }
            }
        }

        function handlePointerMove(e) {
            if (!dragState.active) return;
            const coords = getCanvasCoords(e);
            
            if (dragState.target === 'text') {
                if (dragState.mode === 'drag') {
                    const dx = ((coords.x - dragState.startX) / canvas.width) * 100;
                    const dy = ((coords.y - dragState.startY) / canvas.height) * 100;
                    posXSlider.value = Math.max(0, Math.min(100, dragState.startTextX + dx));
                    posYSlider.value = Math.max(0, Math.min(100, dragState.startTextY + dy));
                } else {
                    const ds = (coords.x - dragState.startX) / scaleMultiplier;
                    fontSizeSlider.value = Math.max(20, Math.min(150, dragState.startSize + ds));
                }
            } else if (dragState.target === 'photo') {
                if (dragState.mode === 'drag') {
                    const dx = ((coords.x - dragState.startX) / canvas.width) * 100;
                    const dy = ((coords.y - dragState.startY) / canvas.height) * 100;
                    photoXSlider.value = Math.max(0, Math.min(100, dragState.startPhotoX + dx));
                    photoYSlider.value = Math.max(0, Math.min(100, dragState.startPhotoY + dy));
                } else {
                    const ds = (coords.x - dragState.startX) / scaleMultiplier;
                    photoSizeSlider.value = Math.max(10, Math.min(400, dragState.startSize + ds));
                }
            }
            updateSliderLabels();
            drawCard();
            e.preventDefault();
        }

        function handlePointerUp() {
            if (dragState.active) {
                dragState.active = false;
                drawCard();
            }
        }

        saveLayoutBtn.addEventListener('click', async () => {
            const currentSrc = bgImage.getAttribute('src');
            if (!currentSrc) return;
            const config = {
                fontSize: parseInt(fontSizeSlider.value),
                posY: parseInt(posYSlider.value),
                posX: parseInt(posXSlider.value),
                photoSize: parseInt(photoSizeSlider.value),
                photoX: parseInt(photoXSlider.value),
                photoY: parseInt(photoYSlider.value),
                color: colorInput.value
            };
            const originalText = saveLayoutBtn.innerHTML;
            saveLayoutBtn.innerHTML = '⌛ جاري الحفظ...';
            saveLayoutBtn.disabled = true;
            const success = await saveTemplateConfigToFirebase(currentSrc, config);
            if (success) {
                autoLayouts[currentSrc] = config;
                saveLayoutBtn.innerHTML = '✅ تم الحفظ كافتراضي!';
                saveLayoutBtn.style.backgroundColor = '#27ae60';
            } else {
                saveLayoutBtn.innerHTML = '❌ فشل الحفظ';
                saveLayoutBtn.style.backgroundColor = '#e74c3c';
            }
            setTimeout(() => {
                saveLayoutBtn.innerHTML = originalText;
                saveLayoutBtn.style.backgroundColor = '#e67e22';
                saveLayoutBtn.disabled = false;
            }, 2000);
        });

        excelInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (evt) {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonStr = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        employeeNamesList = jsonStr.map(row => (row && row[0]) ? row[0].toString().trim() : null).filter(n => n);
                        if (employeeNamesList.length > 0) {
                            batchDownloadBtn.style.display = 'block';
                            batchDownloadBtn.innerHTML = `تنزيل عدد (${employeeNamesList.length}) بطاقة ZIP`;
                            if (imageLoaded) batchDownloadBtn.disabled = false;
                            
                            // Auto-populate first name for preview as requested
                            nameInput.value = employeeNamesList[0];
                            if (imageLoaded) {
                                previewContainer.style.display = 'block';
                                drawCard();
                            }
                            
                            alert(`تم قراءة ${employeeNamesList.length} اسم بنجاح. تم عرض أول اسم للمعاينة.`);
                        }
                    } catch (err) { alert('حدث خطأ أثناء قراءة ملف Excel.'); console.error(err); }
                };
                reader.readAsBinaryString(file);
            }
        });

        batchDownloadBtn.addEventListener('click', async () => {
            if (!imageLoaded || employeeNamesList.length === 0) return;
            batchDownloadBtn.disabled = true;
            generateBtn.disabled = true;
            batchProgress.style.display = 'block';
            totalCount.textContent = employeeNamesList.length;
            const zip = new JSZip();
            const folder = zip.folder("معايدات_الموظفين");
            for (let i = 0; i < employeeNamesList.length; i++) {
                const name = employeeNamesList[i];
                drawCard(name);
                const dataURL = canvas.toDataURL('image/jpeg', 1.0);
                folder.file(`معايدة-${name.replace(/\s+/g, '-')}.jpg`, dataURL.split(',')[1], { base64: true });
                progressCount.textContent = i + 1;
                await new Promise(r => setTimeout(r, 30));
            }
            batchProgress.innerHTML = 'جاري ضغط الملفات...';
            const content = await zip.generateAsync({ type: "blob" });
            saveAs(content, "معايدات_الموظفين.zip");
            batchProgress.style.display = 'none';
            batchDownloadBtn.disabled = false;
            generateBtn.disabled = false;
            // Draw one last time with input value or setup canvas
            if (nameInput.value.trim()) drawCard(); else setupCanvas();
        });

        // --- Initialization ---
        initTemplateConfigs();
        loadTemplate('assets/greeting.png', true); // Force auto-layout on first load
    </script>
</body>

</html>
