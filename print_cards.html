<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>طباعة بطاقة المستفيد - تراؤف</title>
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all-svg.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-teal: #00A59B;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .no-print-bar {
            background: #fff;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .no-print-bar h2 {
            margin: 0;
            color: var(--brand-teal);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background: var(--brand-teal);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #008f86;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .print-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 15mm;
            box-sizing: border-box;
            background: none;
        }

        .print-header {
            text-align: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .print-header img {
            max-height: 60px;
        }

        .print-header h1 {
            font-size: 1.5rem;
            margin: 10px 0 0 0;
            color: #475569;
        }

        /* Beautiful Individual Card */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10mm;
            justify-items: center;
        }

        .card-item-container {
            break-inside: avoid;
            page-break-inside: avoid;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5mm;
        }

        .ind-card-print {
            background: linear-gradient(135deg, #00A59B, #00766c) !important;
            color: #fff !important;
            border-radius: 12px;
            padding: 15px;
            width: 85.6mm;
            height: 53.98mm;
            box-sizing: border-box;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1) !important;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .ind-card-print::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 100% 0%, rgba(255, 255, 255, .15) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(255, 255, 255, .08) 0%, transparent 40%) !important;
            pointer-events: none;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* Front specific */
        .c-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
            margin-bottom: auto;
            /* let flex distribute gap */
        }

        .c-wallet-badge {
            background: transparent !important;
            color: #fff !important;
            padding: 0;
            font-weight: 700;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            gap: 4px;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .c-logo-placeholder {
            display: none !important;
            /* using reflection instead */
        }

        /* New decorative reflection like in the app */
        .bvc-reflection {
            position: absolute;
            top: 0;
            left: 20%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, .15) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-25deg);
            pointer-events: none;
            z-index: 1;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .c-number {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, .5);
            position: relative;
            z-index: 2;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 5px;
            color: #fff !important;
        }

        .c-details-grid {
            display: none;
            /* We will replace this with the bvc-footer style (name and expiry only) to match beneficiary card */
        }

        .bvc-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            position: relative;
            z-index: 2;
            text-transform: uppercase;
        }

        .bvc-footer small {
            font-size: .45rem;
            opacity: 0.7;
            margin-bottom: 2px;
            letter-spacing: 1px;
            display: block;
            color: #fff !important;
        }

        .bvc-footer strong {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #fff !important;
        }

        .bvc-status {
            background: rgba(255, 255, 255, .1) !important;
            border: 1px solid rgba(255, 255, 255, 0.25) !important;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: .55rem;
            font-weight: 600;
            color: #fff !important;
            display: inline-block;
        }

        /* Barcode Area in Front */
        .print-qrcode {
            margin-top: 5px;
            text-align: center;
            z-index: 2;
            position: relative;
            background: rgba(255, 255, 255, 0.85) !important;
            padding: 2px 5px;
            border-radius: 6px;
        }

        .barcode-container svg {
            /* Make barcode strokes black for contrast inside the white box */
            fill: #000 !important;
        }

        .ind-card-back {
            background: #fff !important;
            color: #333 !important;
            border: 1px solid #ddd !important;
        }

        .back-mag-stripe {
            background: #000;
            height: 10mm;
            width: 100%;
            margin: 5px 0;
        }

        .back-instructions {
            padding: 5px 10px;
            font-size: 0.45rem;
            /* Shrunk */
            line-height: 1.2;
            text-align: right;
        }

        .back-instructions h4 {
            margin: 2px 0;
            font-size: 0.55rem;
            color: var(--brand-teal);
        }

        .back-instructions p {
            margin: 2px 0;
        }

        /* Print Media Query */
        @page {
            size: 86mm 54mm;
            margin: 0;
        }

        @media print {

            body,
            html {
                margin: 0 !important;
                padding: 0 !important;
                width: 86mm !important;
                height: auto !important;
                background: #fff !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .container,
            .print-container {
                margin: 0 !important;
                padding: 0 !important;
                width: 86mm !important;
                max-width: 86mm !important;
                min-height: 0 !important;
                box-shadow: none !important;
            }

            .no-print-bar,
            .print-header {
                display: none !important;
            }

            .cards-grid {
                display: block !important;
                margin: 0 !important;
                padding: 0 !important;
                gap: 0 !important;
            }

            .card-item-container {
                margin: 0 !important;
                display: block;
            }

            .ind-card-print {
                margin: 0 !important;
                page-break-after: always;
                break-after: page;
                border-radius: 0;
                height: 54mm !important;
                overflow: hidden !important;
            }
        }

        .bvc-chip {
            width: 40px;
            height: 30px;
            border-radius: 6px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
</head>

<body>

    <!-- Action Bar -->
    <div class="no-print-bar">
        <h2><i class="fas fa-print"></i> لوحة طباعة بطاقات المستفيدين</h2>
        <div style="display:flex; align-items:center; gap:20px;">
            <label
                style="cursor:pointer; display:flex; align-items:center; gap:8px; font-weight:600; color:var(--brand-teal);">
                <input type="checkbox" id="showInstructionsToggle" style="width:18px; height:18px;">
                <span>إظهار التعليمات والباركود الخلفي</span>
            </label>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-secondary" onclick="window.history.back()"><i class="fas fa-arrow-right"></i>
                    عودة</button>
                <button class="btn" onclick="window.print()"><i class="fas fa-file-pdf"></i> استخراج ورقي / PDF</button>
            </div>
        </div>
    </div>

    <!-- Print Area -->
    <div class="print-container">
        <div class="print-header">
            <img src="assets/logo.png" alt="Logo Logo" onerror="this.style.display='none'">
            <h1 id="printPageTitle">بطاقة المستفيد المعتمدة</h1>
        </div>

        <div class="cards-grid" id="printCardsGrid">
            <!-- Cards will be rendered here by JS -->
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('printCardsGrid');
            const toggle = document.getElementById('showInstructionsToggle');
            const urlParams = new URLSearchParams(window.location.search);
            const cardIdFilter = urlParams.get('id');
            const isSinglePrint = cardIdFilter !== null;

            // Initial toggle state
            toggle.checked = isSinglePrint;

            function render() {
                const showBack = toggle.checked;
                let cards = Storage.get('cards') || [];

                if (isSinglePrint) {
                    cards = cards.filter(c => c.id == cardIdFilter);
                }

                if (cards.length === 0) {
                    grid.innerHTML = '<div style="text-align:center; padding:50px; color:#888;">لا توجد بطاقات مطابقة.</div>';
                    return;
                }

                if (!isSinglePrint) {
                    document.getElementById('printPageTitle').innerText = 'سجل البطاقات المعتمدة (الكل)';
                }

                grid.innerHTML = cards.map(c => {
                    const formattedNum = c.number.replace(/(\d{4})(?=\d)/g, '$1 ');
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent('Logo-' + c.number)}`;
                    const cleanNum = c.number.replace(/\s/g, '');

                    // Format Name: First and Last Only
                    let printName = c.beneficiary || 'غير محدد';
                    if (printName !== 'غير محدد') {
                        const nameParts = printName.trim().split(/\s+/);
                        if (nameParts.length > 1) {
                            printName = `${nameParts[0]} ${nameParts[nameParts.length - 1]}`;
                        }
                    }

                    // Format Expiry: MM/YY
                    let printExpiry = c.expiry || '-';
                    if (printExpiry !== '-' && printExpiry.length > 2) {
                        if (printExpiry.includes('-')) {
                            const dateParts = printExpiry.split('-');
                            if (dateParts.length >= 2) {
                                const year = dateParts[0].length === 4 ? dateParts[0].substring(2) : dateParts[0];
                                const month = dateParts[1].padStart(2, '0');
                                printExpiry = `${month}/${year}`;
                            }
                        } else if (printExpiry.includes('/')) {
                            const dateParts = printExpiry.split('/');
                            if (dateParts.length === 2) {
                                printExpiry = `${dateParts[0].padStart(2, '0')}/${dateParts[1]}`;
                            }
                        }
                    }

                    return `
                        <div class="card-item-container">
                            <!-- Front of Card -->
                            <div class="ind-card-print" style="position: relative;">
                                <div class="bvc-reflection"></div>
                                
                                <!-- Header: Logo on Right, Status Hidden -->
                                <div class="c-header-row" style="display:flex; justify-content:flex-end; align-items:flex-start; height: 45px;">
                                    <span class="bvc-status" style="display:none;">${c.status || '-'}</span>
                                </div>
                                <span class="c-wallet-badge" style="position: absolute; top: 5px; right: 15px; z-index: 10;">
                                    <img src="assets/logo.png" style="height:55px; filter: brightness(0) invert(1); object-fit:contain; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;" alt="Logo">
                                </span>
                                
                                <!-- Chip Absolute Position: Middle Right -->
                                <div class="bvc-chip-row" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 10;">
                                    <svg class="bvc-chip" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 75" style="width:50px; height:38px;">
                                        <defs>
                                            <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
                                                <stop offset="0%" stop-color="#f5d76e" />
                                                <stop offset="100%" stop-color="#d4af37" />
                                            </linearGradient>
                                        </defs>
                                        <rect width="100" height="75" rx="12" fill="url(#chipGrad)" stroke="#c5a017" stroke-width="2" />
                                        <path d="M30 0v75M70 0v75M0 37.5h30M70 37.5h30M30 20c15 0 15 35 0 35M70 20c-15 0-15 35 0 35" fill="none" stroke="#c5a017" stroke-width="2" opacity="0.8" />
                                    </svg>
                                </div>
                                
                                <div style="flex-grow:1; display:flex; flex-direction:column; justify-content:center; padding-right: 15px;">
                                    <!-- Card Number -->
                                    <div class="c-number" style="font-size:1.6rem; letter-spacing:4px; margin-bottom:0px; text-align:left; width: 100%; white-space: nowrap; direction: ltr !important; unicode-bidi: bidi-override; display: inline-block;">${formattedNum}</div>
                                </div>
                                
                                <div class="bvc-footer" style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 25px; padding: 0 15px;">
                                    <!-- Name on Right (First element in RTL) -->
                                    <div style="text-align:right;">
                                        <div style="font-size:1.4rem; font-weight:700; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);">${printName}</div>
                                    </div>
                                    <!-- Expiry on Left (Second element in RTL) -->
                                    <div style="text-align:left;">
                                        <div style="font-size:1.2rem; font-weight:700; color: #fff; opacity:0.9;">${printExpiry}</div>
                                    </div>
                                </div>

                                <!-- White Stripe for Barcode and QR -->
                                <div class="print-qrcode" style="position: absolute; bottom: 0; left: 0; width: 100%; height: 35px; background-color: #ffffff; display:flex; justify-content:center; align-items:center; gap: 40px; z-index: 20; border-bottom-left-radius: 0; border-bottom-right-radius: 0;">
                                    <div><img src="${qrUrl}" alt="QR Code" style="width:25px;height:25px;"></div>
                                    <div class="barcode-container" style="margin: 0; display:flex; align-items:center;">
                                        <svg class="barcode" jsbarcode-format="CODE128" jsbarcode-value="${cleanNum}" jsbarcode-displayvalue="true" jsbarcode-height="20" jsbarcode-width="1.2" jsbarcode-fontSize="10" jsbarcode-margin="0" jsbarcode-lineColor="#000"></svg>
                                    </div>
                                </div>
                            </div>

                            <!-- Back of Card -->
                            ${showBack ? `
                            <div class="ind-card-print ind-card-back">
                                <div class="back-mag-stripe"></div>
                                <div class="back-instructions">
                                    <h4><i class="fas fa-info-circle" style="color:#00A59B;"></i> تعليمات استخدام البطاقة</h4>
                                    <p>• هذه البطاقة ملك لجمعية "تراؤف" وتستخدم فقط من قبل صاحبها.</p>
                                    <p>• يمنع استغلال البطاقة في غير الأغراض المخصصة لها أو رهنها.</p>
                                    <p>• عند فقدان البطاقة يجب إبلاغ الجمعية فوراً لإيقافها وإصدار بدل فاقد.</p>
                                    <p>• <strong>في حال العثور عليها:</strong> يرجى تسليمها لأقرب فرع للجمعية.</p>
                                    <p>• الرقم الموحد للاستفسارات والبلاغات: <strong>8003010083</strong></p>
                                </div>
                                <div class="barcode-container" style="margin-top:20px;">
                                     <svg class="barcode" jsbarcode-format="CODE128" jsbarcode-value="${cleanNum}" jsbarcode-displayvalue="false" jsbarcode-height="30" jsbarcode-width="1.5" jsbarcode-margin="0"></svg>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');

                if (typeof JsBarcode !== 'undefined') {
                    JsBarcode(".barcode").init();
                }
            }

            toggle.addEventListener('change', render);
            render();

            if (isSinglePrint) {
                set(() => { window.print(); }, 1200);
            }
        });
    </script>
</body>

</html>
